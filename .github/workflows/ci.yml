name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build
        run: swift build -c release

      - name: Package app bundle
        run: make app

      - name: Validate bundle metadata
        run: |
          test -x build/BlackBar.app/Contents/MacOS/BlackBar
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' build/BlackBar.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/BlackBar.app/Contents/Info.plist
